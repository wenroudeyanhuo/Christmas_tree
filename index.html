<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芭比梦幻粉-V13终极复刻版</title>
    <style>
        /* --- UI 样式 --- */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050203;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* 摄像头预览 */
        #webcam-view {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 180px;
            height: 135px;
            border: 3px solid #FF69B4;
            border-radius: 12px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
            opacity: 0.9;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* 加载层 */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0005;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .loader-spinner {
            border: 4px solid #333;
            border-top: 4px solid #FF1493;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        #loading-text {
            color: #FFC1E0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 底部状态条 */
        #ui-layer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #FFF;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        #current-state {
            font-size: 2em;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 10px;
            display: block;
        }

        .tips {
            font-size: 1.2em;
            color: #FFC1E0;
            font-weight: 500;
            transition: all 0.2s;
        }

        .highlight {
            color: #FFF !important;
            text-shadow: 0 0 15px #FF1493;
            transform: scale(1.1);
            display: inline-block;
        }

        .pinch-ready {
            color: #00FF00 !important;
        }

        /* 右上角控制台 */
        #controls-container {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }

        input[type="file"] {
            display: none;
        }

        .control-btn {
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid #FF69B4;
            color: #FFF;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #FF1493;
            box-shadow: 0 0 20px #FF1493;
        }

        .upload-hint {
            font-size: 12px;
            color: #FFC1E0;
            margin-top: -5px;
            text-shadow: 0 1px 2px #000;
        }

        #play-btn {
            display: none;
        }

        #play-btn.playing {
            background: rgba(0, 255, 0, 0.2);
            border-color: #00FF00;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <video id="webcam-view" autoplay playsinline></video>

    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div id="loading-text">RESTORING V13 CONFIG...</div>
        <div id="loading-note" style="font-size: 12px; color: #666; margin-top: 10px;">(Live Server Required)</div>
    </div>

    <div id="controls-container">
        <div style="text-align: right;">
            <input type="file" id="file-input" accept="image/*" multiple>
            <label for="file-input" class="control-btn">📷 Upload Photos (Multiple)</label>
            <div class="upload-hint">Tip: Hold Ctrl/Shift to select many</div>
        </div>
        <div>
            <input type="file" id="music-input" accept="audio/*">
            <label for="music-input" class="control-btn">🎵 Upload Music</label>
        </div>
        <button id="play-btn" class="control-btn">▶ Play</button>
    </div>
    <audio id="bgm-player" loop></audio>

    <div id="ui-layer">
        <span id="current-state">SYSTEM READY</span>
        <div id="tips-text" class="tips">
            <span id="h-palm">🖐 Move: Rotate</span> |
            <span id="h-fist">✊ Fist: Collapse</span> |
            <span id="h-pinch">👌 Pinch: View Photo</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilesetResolver, GestureRecognizer } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        // ==========================================
        // 1. 全局配置 (V13 终极复刻)
        // ==========================================
        const CONFIG = {
            // 基础粉色元素
            SPHERE_COUNT: 2400, CUBE_COUNT: 1200, CANDY_COUNT: 800,
            // 【恢复】新增的大型银色元素 (约占总量1/4)
            LARGE_SPHERE_COUNT: 600, LARGE_CUBE_COUNT: 300, LARGE_CANDY_COUNT: 200,

            RIBBON_SEGMENTS: 4500, PHOTO_COUNT: 18, SPARKLE_COUNT: 400,

            // 芭比配色
            PALETTE: [0xFF1493, 0xFF69B4, 0xFFB6C1, 0xFFFFFF, 0xE0BFB8],
            // 【恢复】银白色系
            SILVER_PALETTE: [0xFFFFFF, 0xE0E0E0, 0xC0C0C0, 0xF5F5F5],

            TREE_HEIGHT: 30, TREE_RADIUS: 15,
            TRANSITION_SPEED: 2.5, PINCH_THRESHOLD: 0.1, ROTATION_SENSITIVITY: 3.0
        };

        const STATES = { COLLAPSED: 'COLLAPSED', SCATTERED: 'SCATTERED', ENLARGED: 'ENLARGED' };

        let currentState = STATES.COLLAPSED;
        let scene, camera, renderer, composer, controls, envMap;
        let clock = new THREE.Clock();

        // Mesh 组
        let sphereMesh, cubeMesh, candyMesh;
        let largeSphereMesh, largeCubeMesh, largeCandyMesh; // 【恢复】大型Mesh
        let ribbonMesh, starMesh;
        let sparklesSystem, starPointLight, bloomPass;
        let auraMesh, ambientDustSystem, foregroundDustSystem;

        let particlesData = []; let photosData = []; let photoMeshes = [];
        let defaultFrameTexture; let sparkleData = [];
        let currentMusicObjectUrl = null;
        let currentParticleEmissiveIntensity = null;
        let audioContext = null;
        let audioAnalyser = null;
        let audioDataArray = null;
        let audioReactiveLevel = 0;
        let audioPulseLevel = 0;
        let audioEnergyBaseline = 0;

        let gestureRecognizer; let lastVideoTime = -1; let isGrabbing = false;
        let selectedPhotoIndex = -1;
        let targetSceneRotationY = 0; let targetSceneRotationX = 0;
        let lastHandX = 0.5; let lastHandY = 0.5;

        const videoEl = document.getElementById('webcam-view');
        const stateLabel = document.getElementById('current-state');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const loadingNote = document.getElementById('loading-note');
        const hints = { palm: document.getElementById('h-palm'), fist: document.getElementById('h-fist'), pinch: document.getElementById('h-pinch') };
        const defaultHintText = {
            palm: hints.palm.textContent,
            fist: hints.fist.textContent,
            pinch: hints.pinch.textContent
        };

        // ==========================================
        // 2. 初始化
        // ==========================================
        function setLoadingState(message, note = "") {
            loadingText.innerText = message;
            loadingNote.innerText = note;
        }

        function hideLoader() {
            if (!loadingScreen || loadingScreen.dataset.hidden === "true") return;
            loadingScreen.dataset.hidden = "true";
            loadingScreen.style.opacity = 0;
            setTimeout(() => loadingScreen.remove(), 800);
        }

        function setGestureFallbackState(message) {
            stateLabel.innerText = message;
            hints.palm.textContent = 'Drag: Orbit';
            hints.fist.textContent = 'Camera unavailable';
            hints.pinch.textContent = 'Upload: Refresh photos';
            highlightHint(null);
        }

        function restoreDefaultHintText() {
            hints.palm.textContent = defaultHintText.palm;
            hints.fist.textContent = defaultHintText.fist;
            hints.pinch.textContent = defaultHintText.pinch;
        }

        function updateParticleEmissiveIntensity(intensity) {
            if (currentParticleEmissiveIntensity === intensity) return;
            currentParticleEmissiveIntensity = intensity;

            const updatedMeshes = new Set();
            particlesData.forEach(p => {
                if (!p.baseEmissive || updatedMeshes.has(p.mesh)) return;
                p.mesh.material.emissive.copy(p.baseEmissive).multiplyScalar(intensity);
                updatedMeshes.add(p.mesh);
            });
        }

        function updateAudioReactiveGlow() {
            const glowBoost = 1 + audioReactiveLevel * 1.0 + audioPulseLevel * 0.7;
            const sparkleBoost = 0.22 + audioReactiveLevel * 0.2 + audioPulseLevel * 0.22;

            if (sphereMesh) sphereMesh.material.emissiveIntensity = 1.5 * glowBoost;
            if (cubeMesh) cubeMesh.material.emissiveIntensity = 1.0 * (1 + audioReactiveLevel * 0.7);
            if (candyMesh) candyMesh.material.emissiveIntensity = 2.0 * glowBoost;
            if (largeSphereMesh) largeSphereMesh.material.emissiveIntensity = 0.5 * (1 + audioReactiveLevel * 1.1);
            if (largeCubeMesh) largeCubeMesh.material.emissiveIntensity = 0.5 * (1 + audioReactiveLevel * 0.9);
            if (largeCandyMesh) largeCandyMesh.material.emissiveIntensity = 0.5 * (1 + audioReactiveLevel * 1.0);
            if (ribbonMesh) ribbonMesh.material.emissiveIntensity = 2.0 * (1 + audioReactiveLevel * 0.8 + audioPulseLevel * 0.5);
            if (starMesh) starMesh.material.emissiveIntensity = 1.35 * (1 + audioReactiveLevel * 1.0 + audioPulseLevel * 0.6);
            if (sparklesSystem) {
                sparklesSystem.material.opacity = 0.45 + Math.sin(clock.getElapsedTime() * 5) * 0.25 + sparkleBoost;
                sparklesSystem.material.size = 0.3 + audioReactiveLevel * 0.1 + audioPulseLevel * 0.08;
            }
            if (bloomPass) {
                bloomPass.strength = 2.0 + audioReactiveLevel * 0.55 + audioPulseLevel * 0.35;
                bloomPass.radius = 0.6 + audioReactiveLevel * 0.06;
            }
        }

        function disposeTextureIfOwned(texture) {
            if (!texture || texture === defaultFrameTexture) return;
            texture.dispose();
        }

        function setPhotoTexture(mesh, texture) {
            const oldTexture = mesh.material.map;
            if (oldTexture === texture) return;
            mesh.material.map = texture;
            mesh.material.needsUpdate = true;
            disposeTextureIfOwned(oldTexture);
        }

        function ensureAudioAnalyser(audioPlayer) {
            if (audioAnalyser || typeof AudioContext === 'undefined') return;

            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextCtor) return;

            audioContext = new AudioContextCtor();
            const source = audioContext.createMediaElementSource(audioPlayer);
            audioAnalyser = audioContext.createAnalyser();
            audioAnalyser.fftSize = 256;
            audioDataArray = new Uint8Array(audioAnalyser.frequencyBinCount);
            source.connect(audioAnalyser);
            audioAnalyser.connect(audioContext.destination);
        }

        async function resumeAudioContextIfNeeded() {
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
        }

        function getPhotoDepthScore(photo) {
            const worldPos = photo.mesh.getWorldPosition(new THREE.Vector3());
            return camera.position.distanceToSquared(worldPos);
        }

        function selectFocusPhotoIndex() {
            if (!photosData.length) return -1;

            let bestIndex = 0;
            let bestScore = Infinity;
            const screenCenter = new THREE.Vector2(0, 0);
            const worldPos = new THREE.Vector3();

            photosData.forEach((photo, index) => {
                photo.mesh.getWorldPosition(worldPos);
                const projected = worldPos.clone().project(camera);
                if (projected.z < -1 || projected.z > 1) return;
                const centerScore = projected.distanceToSquared(screenCenter);
                const depthScore = getPhotoDepthScore(photo) * 0.0005;
                const score = centerScore + depthScore;
                if (score < bestScore) {
                    bestScore = score;
                    bestIndex = index;
                }
            });

            return bestIndex;
        }

        function triggerPhotoFocus(index = selectFocusPhotoIndex()) {
            if (currentState !== STATES.SCATTERED || isGrabbing || index < 0) return;
            isGrabbing = true;
            selectedPhotoIndex = index;
            switchState(STATES.ENLARGED);
            setTimeout(() => isGrabbing = false, 1500);
        }

        function initFallbackInteractions() {
            renderer.domElement.addEventListener('dblclick', () => {
                if (currentState === STATES.COLLAPSED) {
                    switchState(STATES.SCATTERED);
                    return;
                }
                if (currentState === STATES.ENLARGED) {
                    switchState(STATES.SCATTERED);
                    return;
                }
                triggerPhotoFocus();
            });

            renderer.domElement.addEventListener('touchend', (event) => {
                if (event.touches.length === 0 && event.changedTouches.length === 1) {
                    triggerPhotoFocus();
                }
            }, { passive: true });
        }

        async function init() {
            try {
                defaultFrameTexture = createTrueColorFrame(null);
                initThreeScene(); generateEnvMap();

                initElements(); // 基础粉色
                initLargeElements(); // 【恢复】大型银色

                initRibbon(); initStar(); initSparkles(); initAtmosphere(); initPhotos();
                initPostProcessing();
                initUpload(); initMusic();
                initFallbackInteractions();

                animate();
                switchState(STATES.COLLAPSED);
                hideLoader();

                try {
                    await initMediaPipe();
                    restoreDefaultHintText();
                } catch (gestureError) {
                    console.error(gestureError);
                    setGestureFallbackState('BARBIE TREE VIEW MODE');
                }
            } catch (e) {
                console.error(e);
                setLoadingState('STARTUP ERROR', 'Please refresh and try again.');
                stateLabel.innerText = 'VIEW UNAVAILABLE';
            }
        }

        // ==========================================
        // 3. 音乐与上传
        // ==========================================
        function initMusic() {
            const musicInput = document.getElementById('music-input');
            const audioPlayer = document.getElementById('bgm-player');
            const playBtn = document.getElementById('play-btn');
            musicInput.addEventListener('change', (e) => {
                const file = e.target.files[0]; if (!file) return;
                if (currentMusicObjectUrl) {
                    URL.revokeObjectURL(currentMusicObjectUrl);
                }
                currentMusicObjectUrl = URL.createObjectURL(file);
                audioPlayer.src = currentMusicObjectUrl; audioPlayer.volume = 0.5;
                audioReactiveLevel = 0;
                audioPulseLevel = 0;
                audioEnergyBaseline = 0;
                ensureAudioAnalyser(audioPlayer);
                playBtn.style.display = 'inline-flex'; playBtn.innerHTML = '▶ Play Music';
                resumeAudioContextIfNeeded()
                    .then(() => audioPlayer.play())
                    .then(() => updatePlayBtnState(true))
                    .catch(() => updatePlayBtnState(false));
            });
            playBtn.addEventListener('click', () => {
                if (audioPlayer.paused) {
                    resumeAudioContextIfNeeded()
                        .then(() => audioPlayer.play())
                        .then(() => updatePlayBtnState(true))
                        .catch(() => updatePlayBtnState(false));
                }
                else { audioPlayer.pause(); updatePlayBtnState(false); }
            });
            function updatePlayBtnState(isPlaying) {
                if (isPlaying) { playBtn.innerHTML = '⏸ Pause'; playBtn.classList.add('playing'); }
                else { playBtn.innerHTML = '▶ Play Music'; playBtn.classList.remove('playing'); }
            }
        }

        function initUpload() {
            const fileInput = document.getElementById('file-input');
            fileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files); if (!files.length) return;
                switchState(STATES.SCATTERED);
                const texturePromises = files.map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => { resolve(createTrueColorFrame(img)); };
                            img.onerror = () => { resolve(createTrueColorFrame(null)); };
                            img.src = ev.target.result;
                        };
                        reader.onerror = () => { resolve(createTrueColorFrame(null)); };
                        reader.readAsDataURL(file);
                    });
                });
                const newTextures = await Promise.all(texturePromises);
                for (let i = 0; i < CONFIG.PHOTO_COUNT; i++) {
                    const texture = newTextures[i % newTextures.length];
                    setPhotoTexture(photoMeshes[i], texture);
                }
            });
        }

        // ==========================================
        // 4. 场景搭建
        // ==========================================
        function initThreeScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0005);
            scene.fog = new THREE.FogExp2(0x0a0005, 0.012);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 55);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.NoToneMapping;
            document.body.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.autoRotate = true; controls.autoRotateSpeed = 0.8;
            scene.add(new THREE.AmbientLight(0xFFC1E0, 0.6));
            const mainLight = new THREE.DirectionalLight(0xFFD700, 2.5); mainLight.position.set(30, 40, 20); scene.add(mainLight);
            const pinkLight = new THREE.DirectionalLight(0xFF1493, 2.0); pinkLight.position.set(-30, 10, -10); scene.add(pinkLight);
        }

        function generateEnvMap() {
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            const envScene = new THREE.Scene();
            envScene.background = new THREE.Color(0x442233);
            const box = new THREE.Mesh(new THREE.BoxGeometry(100, 100, 100), new THREE.MeshBasicMaterial({ color: 0xFF69B4, side: THREE.BackSide }));
            envScene.add(box);
            envMap = pmremGenerator.fromScene(envScene).texture;
            pmremGenerator.dispose();
        }

        function initPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            // 阈值0.95，确保原色照片不发光
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.6, 0.95);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene); composer.addPass(bloomPass);
        }

        // ==========================================
        // 5. 元素初始化
        // ==========================================
        function initElements() {
            const luxuryMatBase = { roughness: 0.15, metalness: 0.9, envMap: envMap, envMapIntensity: 1.5 };
            const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
            const sphereMat = new THREE.MeshStandardMaterial({ ...luxuryMatBase, color: 0xFFFFFF, emissive: 0xFF1493, emissiveIntensity: 1.5 });
            sphereMesh = createInstancedGroup(sphereGeo, sphereMat, CONFIG.SPHERE_COUNT, CONFIG.PALETTE);
            const cubeGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const cubeMat = new THREE.MeshStandardMaterial({ ...luxuryMatBase, roughness: 0.3, color: 0xE0E0E0, emissive: 0x553344, emissiveIntensity: 1.0 });
            cubeMesh = createInstancedGroup(cubeGeo, cubeMat, CONFIG.CUBE_COUNT, CONFIG.PALETTE);
            const candyGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.7, 8);
            const candyMat = new THREE.MeshStandardMaterial({ ...luxuryMatBase, color: 0xFF1493, emissive: 0xFF0055, emissiveIntensity: 2.0 });
            candyMesh = createInstancedGroup(candyGeo, candyMat, CONFIG.CANDY_COUNT, CONFIG.PALETTE);
        }

        // 【恢复】初始化大型银色元素
        function initLargeElements() {
            const silverMatBase = { roughness: 0.1, metalness: 1.0, envMap: envMap, envMapIntensity: 2.0, emissive: 0xFFFFFF, emissiveIntensity: 0.5 };
            // 尺寸加倍
            const largeSphereGeo = new THREE.SphereGeometry(0.5, 24, 24);
            const largeSphereMat = new THREE.MeshStandardMaterial({ ...silverMatBase, color: 0xFFFFFF });
            largeSphereMesh = createInstancedGroup(largeSphereGeo, largeSphereMat, CONFIG.LARGE_SPHERE_COUNT, CONFIG.SILVER_PALETTE);
            const largeCubeGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const largeCubeMat = new THREE.MeshStandardMaterial({ ...silverMatBase, roughness: 0.2, color: 0xE0E0E0 });
            largeCubeMesh = createInstancedGroup(largeCubeGeo, largeCubeMat, CONFIG.LARGE_CUBE_COUNT, CONFIG.SILVER_PALETTE);
            const largeCandyGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.4, 12);
            const largeCandyMat = new THREE.MeshStandardMaterial({ ...silverMatBase, color: 0xF0F0F0 });
            largeCandyMesh = createInstancedGroup(largeCandyGeo, largeCandyMat, CONFIG.LARGE_CANDY_COUNT, CONFIG.SILVER_PALETTE);
        }

        function initRibbon() {
            const geo = new THREE.TetrahedronGeometry(0.12);
            const mat = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF, emissive: 0xFFFFFF,
                emissiveIntensity: 2.0, // 【恢复】减弱丝带辉光 (3.0 -> 2.0)
                roughness: 0.3, metalness: 0.5
            });
            ribbonMesh = new THREE.InstancedMesh(geo, mat, CONFIG.RIBBON_SEGMENTS);
            const dummy = new THREE.Object3D(); const turns = 3.5;
            for (let i = 0; i < CONFIG.RIBBON_SEGMENTS; i++) {
                const t = i / (CONFIG.RIBBON_SEGMENTS - 1);
                const h = t * CONFIG.TREE_HEIGHT - CONFIG.TREE_HEIGHT / 2;
                const hPercent = 1 - (h + CONFIG.TREE_HEIGHT / 2) / CONFIG.TREE_HEIGHT;
                const rBase = CONFIG.TREE_RADIUS * Math.pow(hPercent, 0.7) + 2.0;
                const angle = t * turns * Math.PI * 2;
                const centerX = rBase * Math.cos(angle); const centerZ = rBase * Math.sin(angle);
                const bandWidth = 1.8;
                const offsetX = (Math.random() - 0.5) * bandWidth;
                const offsetY = (Math.random() - 0.5) * (bandWidth * 0.4);
                const offsetZ = (Math.random() - 0.5) * bandWidth;
                const collapsedPos = new THREE.Vector3(centerX + offsetX, h + offsetY, centerZ + offsetZ);
                const scatteredPos = new THREE.Vector3((Math.random() - 0.5) * 80, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 80);
                dummy.position.copy(collapsedPos);
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                dummy.scale.setScalar(0.6 + Math.random() * 0.4);
                dummy.updateMatrix();
                ribbonMesh.setMatrixAt(i, dummy.matrix);
                particlesData.push({
                    mesh: ribbonMesh, index: i, current: collapsedPos.clone(), target: collapsedPos.clone(),
                    collapsed: collapsedPos, scattered: scatteredPos, driftOffset: i * 0.1,
                    rotationSpeed: new THREE.Vector3(0.02, 0.04, 0.01), isRibbon: true
                });
            }
            scene.add(ribbonMesh);
        }

        function initStar() {
            const starShape = new THREE.Shape();
            const points = 5; const outerR = 2.8; const innerR = 0.9;
            for (let i = 0; i < points * 2; i++) {
                const r = i % 2 === 0 ? outerR : innerR;
                const a = (i / (points * 2)) * Math.PI * 2;
                if (i === 0) starShape.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                else starShape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            starShape.closePath();
            const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1, bevelSegments: 3 };
            const starGeo = new THREE.ExtrudeGeometry(starShape, extrudeSettings);
            const starMat = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF, emissive: 0xFFFFFF,
                emissiveIntensity: 1.35, // 【恢复】减弱星星辉光 (2.0 -> 1.35)
                roughness: 0.1, metalness: 0.8, envMap: envMap
            });
            starMesh = new THREE.Mesh(starGeo, starMat);
            starMesh.scale.set(0.5, 0.5, 0.5);
            const topPos = new THREE.Vector3(0, CONFIG.TREE_HEIGHT / 2 + 2.5, 0);
            const floatPos = new THREE.Vector3(0, CONFIG.TREE_HEIGHT / 2 + 25, 0);
            starMesh.position.copy(topPos);

            starPointLight = new THREE.PointLight(0xFFFFFF, 0.8, 40); // 【恢复】减弱点光源
            starPointLight.position.copy(topPos);
            scene.add(starPointLight);

            particlesData.push({
                mesh: starMesh, current: topPos.clone(), target: topPos.clone(),
                collapsed: topPos, scattered: floatPos, driftOffset: 0,
                rotationSpeed: new THREE.Vector3(0, 0.02, 0), isStar: true
            });
            scene.add(starMesh);
        }

        function initSparkles() {
            const geo = new THREE.BufferGeometry();
            const posArray = new Float32Array(CONFIG.SPARKLE_COUNT * 3);
            const startPos = new THREE.Vector3(0, CONFIG.TREE_HEIGHT / 2 + 3, 0);
            for (let i = 0; i < CONFIG.SPARKLE_COUNT; i++) {
                posArray[i * 3] = startPos.x; posArray[i * 3 + 1] = startPos.y; posArray[i * 3 + 2] = startPos.z;
                sparkleData.push({
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.5, -Math.random() * 0.8 - 0.2, (Math.random() - 0.5) * 0.5),
                    life: Math.random() * 100
                });
            }
            geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xFFFFFF, size: 0.3, transparent: true, opacity: 0.8,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            sparklesSystem = new THREE.Points(geo, mat);
            scene.add(sparklesSystem);
        }

        function createSoftGlowTexture(innerColor, outerColor) {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(size / 2, size / 2, 10, size / 2, size / 2, size / 2);
            gradient.addColorStop(0, innerColor);
            gradient.addColorStop(0.35, outerColor);
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function initAtmosphere() {
            const auraTexture = createSoftGlowTexture('rgba(255, 182, 193, 0.55)', 'rgba(255, 20, 147, 0.08)');
            const auraMaterial = new THREE.SpriteMaterial({
                map: auraTexture,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                opacity: 0.55
            });
            auraMesh = new THREE.Sprite(auraMaterial);
            auraMesh.position.set(0, 2, -8);
            auraMesh.scale.set(52, 52, 1);
            scene.add(auraMesh);

            const ambientGeo = new THREE.BufferGeometry();
            const ambientCount = 420;
            const ambientPositions = new Float32Array(ambientCount * 3);
            for (let i = 0; i < ambientCount; i++) {
                const radius = 28 + Math.random() * 26;
                const theta = Math.random() * Math.PI * 2;
                const y = (Math.random() - 0.5) * 42;
                ambientPositions[i * 3] = Math.cos(theta) * radius;
                ambientPositions[i * 3 + 1] = y;
                ambientPositions[i * 3 + 2] = Math.sin(theta) * radius;
            }
            ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
            const ambientMat = new THREE.PointsMaterial({
                color: 0xFFD6E7,
                size: 0.22,
                transparent: true,
                opacity: 0.22,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            ambientDustSystem = new THREE.Points(ambientGeo, ambientMat);
            scene.add(ambientDustSystem);

            const foregroundGeo = new THREE.BufferGeometry();
            const foregroundCount = 36;
            const foregroundPositions = new Float32Array(foregroundCount * 3);
            for (let i = 0; i < foregroundCount; i++) {
                foregroundPositions[i * 3] = (Math.random() - 0.5) * 18;
                foregroundPositions[i * 3 + 1] = (Math.random() - 0.5) * 12;
                foregroundPositions[i * 3 + 2] = 18 + Math.random() * 18;
            }
            foregroundGeo.setAttribute('position', new THREE.BufferAttribute(foregroundPositions, 3));
            const foregroundMat = new THREE.PointsMaterial({
                color: 0xFFFFFF,
                size: 0.55,
                transparent: true,
                opacity: 0.16,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            foregroundDustSystem = new THREE.Points(foregroundGeo, foregroundMat);
            scene.add(foregroundDustSystem);
        }

        function createInstancedGroup(geo, mat, count, palette) {
            const mesh = new THREE.InstancedMesh(geo, mat, count);
            const dummy = new THREE.Object3D();
            const color = new THREE.Color();
            for (let i = 0; i < count; i++) {
                const posData = calculatePositions(i, count);
                color.setHex(palette[Math.floor(Math.random() * palette.length)]);
                const baseEmissive = mat.emissive ? mat.emissive.clone() : new THREE.Color(0x000000);
                mesh.setColorAt(i, color);
                dummy.position.copy(posData.collapsed);
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                dummy.scale.setScalar(0.4 + Math.random() * 0.6);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
                particlesData.push({
                    mesh: mesh, index: i, current: posData.collapsed.clone(), target: posData.collapsed.clone(),
                    collapsed: posData.collapsed, scattered: posData.scattered, driftOffset: Math.random() * 100,
                    rotation: new THREE.Euler(
                        dummy.rotation.x,
                        dummy.rotation.y,
                        dummy.rotation.z
                    ),
                    rotationSpeed: new THREE.Vector3(Math.random() * 0.02, Math.random() * 0.02, Math.random() * 0.02),
                    baseEmissive: baseEmissive
                });
            }
            scene.add(mesh);
            return mesh;
        }

        function calculatePositions(i, total) {
            const y = (Math.random() * CONFIG.TREE_HEIGHT) - (CONFIG.TREE_HEIGHT / 2);
            const hPercent = 1 - (y + CONFIG.TREE_HEIGHT / 2) / CONFIG.TREE_HEIGHT;
            const rTree = Math.random() * CONFIG.TREE_RADIUS * Math.pow(hPercent, 0.8) * (0.8 + Math.random() * 0.4);
            const theta = Math.random() * Math.PI * 2 * 6;
            const collapsed = new THREE.Vector3(rTree * Math.cos(theta), y, rTree * Math.sin(theta));
            const rCloud = 35 + Math.random() * 25;
            const phi = Math.acos(-1 + (2 * i) / total);
            const thetaCloud = Math.sqrt(total * Math.PI) * phi;
            const scattered = new THREE.Vector3(
                rCloud * Math.cos(thetaCloud) * Math.sin(phi),
                rCloud * Math.sin(thetaCloud) * Math.sin(phi),
                rCloud * Math.cos(phi)
            );
            return { collapsed, scattered };
        }

        // ==========================================
        // 7. 原色相框
        // ==========================================
        function createTrueColorFrame(img) {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const FRAME_BG = '#FFC1E0'; const INNER_BG = '#FFF0F5';
            ctx.fillStyle = FRAME_BG; ctx.fillRect(0, 0, size, size);
            const pad = 60; const inner = size - pad * 2;
            ctx.fillStyle = INNER_BG; ctx.fillRect(pad, pad, inner, inner);
            ctx.save();
            ctx.beginPath(); ctx.rect(pad, pad, inner, inner); ctx.clip();
            if (img) {
                const aspect = img.width / img.height;
                let dw, dh, dx, dy;
                if (aspect > 1) { dh = inner; dw = inner * aspect; dx = pad - (dw - inner) / 2; dy = pad; }
                else { dw = inner; dh = inner / aspect; dx = pad; dy = pad - (dh - inner) / 2; }
                ctx.drawImage(img, dx, dy, dw, dh);
            } else {
                ctx.font = "italic 70px 'Segoe UI'"; ctx.fillStyle = "#D87093";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("True Color", size / 2, size / 2);
            }
            ctx.restore();
            ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.roundRect(pad - 10, pad - 10, inner + 20, inner + 20, 20); ctx.stroke();
            drawBow(ctx, pad + 5, pad + 5, '#FF69B4', '#FFD700');
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.minFilter = THREE.LinearFilter;
            return tex;
        }

        function drawBow(ctx, x, y, color, accent) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = color; ctx.strokeStyle = accent; ctx.lineWidth = 3;
            const drawWing = (flip) => {
                ctx.save(); if (flip) ctx.scale(-1, 1);
                ctx.beginPath(); ctx.moveTo(0, 0);
                ctx.bezierCurveTo(35, -35, 70, -15, 60, 25);
                ctx.bezierCurveTo(50, 50, 15, 35, 0, 15);
                ctx.fill(); ctx.stroke(); ctx.restore();
            };
            drawWing(false); drawWing(true);
            ctx.beginPath(); ctx.moveTo(0, 15); ctx.quadraticCurveTo(-25, 70, -50, 90);
            ctx.moveTo(0, 15); ctx.quadraticCurveTo(25, 70, 50, 90);
            ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fillStyle = accent; ctx.fill();
            ctx.restore();
        }

        function initPhotos() {
            const planeGeo = new THREE.PlaneGeometry(3.5, 3.5);
            for (let i = 0; i < CONFIG.PHOTO_COUNT; i++) {
                const mat = new THREE.MeshBasicMaterial({
                    map: defaultFrameTexture, side: THREE.DoubleSide, transparent: true,
                    color: 0xcccccc, toneMapped: false
                });
                const mesh = new THREE.Mesh(planeGeo, mat);
                const pos = calculatePositions(i, CONFIG.PHOTO_COUNT);
                mesh.position.copy(pos.collapsed); mesh.lookAt(0, pos.collapsed.y, 0);
                scene.add(mesh);
                photoMeshes.push(mesh);
                photosData.push({
                    mesh: mesh, current: pos.collapsed.clone(), target: pos.collapsed.clone(),
                    collapsed: pos.collapsed, scattered: pos.scattered,
                    initialRot: mesh.rotation.clone(), driftOffset: Math.random() * 10
                });
            }
        }

        // ==========================================
        // 8. 动画与状态机
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const lerpSpeed = Math.min(delta * CONFIG.TRANSITION_SPEED, 1);

            if (audioAnalyser && audioDataArray) {
                audioAnalyser.getByteFrequencyData(audioDataArray);
                const lowBand = audioDataArray.slice(0, 12);
                const highBand = audioDataArray.slice(12, 48);
                const lowAverage = lowBand.reduce((sum, value) => sum + value, 0) / Math.max(lowBand.length, 1);
                const highAverage = highBand.reduce((sum, value) => sum + value, 0) / Math.max(highBand.length, 1);
                const weightedEnergy = lowAverage * 0.7 + highAverage * 0.3;
                if (audioEnergyBaseline === 0) {
                    audioEnergyBaseline = weightedEnergy;
                } else {
                    audioEnergyBaseline += (weightedEnergy - audioEnergyBaseline) * 0.02;
                }

                const relativeEnergy = Math.max(0, weightedEnergy - (audioEnergyBaseline + 10));
                const normalizedEnergy = Math.min(1, relativeEnergy / 70);
                const targetReactiveLevel = Math.pow(normalizedEnergy, 1.55) * 0.8;
                const relativeLow = Math.max(0, lowAverage - (audioEnergyBaseline + 18));
                const pulseTarget = Math.min(1, relativeLow / 55) * 0.75;
                audioReactiveLevel += (targetReactiveLevel - audioReactiveLevel) * 0.16;
                audioPulseLevel += (pulseTarget - audioPulseLevel) * 0.22;
            } else {
                audioReactiveLevel += (0 - audioReactiveLevel) * 0.08;
                audioPulseLevel += (0 - audioPulseLevel) * 0.12;
                audioEnergyBaseline += (0 - audioEnergyBaseline) * 0.05;
            }

            scene.rotation.y += (targetSceneRotationY - scene.rotation.y) * 0.05;
            scene.rotation.x += (targetSceneRotationX - scene.rotation.x) * 0.05;

            const dummy = new THREE.Object3D();

            // 1. InstancedMesh 更新
            particlesData.forEach(p => {
                p.current.lerp(p.target, lerpSpeed);
                if (currentState === STATES.SCATTERED) {
                    p.current.y += Math.sin(time * 0.5 + p.driftOffset) * 0.03;
                    p.current.x += Math.cos(time * 0.5 + p.driftOffset) * 0.01;
                }

                if (p.isStar) {
                    p.mesh.position.copy(p.current);
                    p.mesh.rotation.y += p.rotationSpeed.y;
                    p.mesh.rotation.z = Math.sin(time) * (0.12 + audioReactiveLevel * 0.16);
                    p.mesh.scale.setScalar(0.5 + audioReactiveLevel * 0.16 + audioPulseLevel * 0.12);
                    starPointLight.position.copy(p.current);
                    starPointLight.intensity = 0.8 + audioReactiveLevel * 2.6 + audioPulseLevel * 1.8;
                } else {
                    dummy.position.copy(p.current);
                    const baseScale = currentState === STATES.SCATTERED ? (p.isRibbon ? 1.0 : 0.8) : (p.isRibbon ? 0.8 : 0.5);
                    const reactiveBoost = p.isRibbon
                        ? audioReactiveLevel * 0.18 + audioPulseLevel * 0.08
                        : audioReactiveLevel * 0.1 + audioPulseLevel * 0.04;
                    const s = baseScale + reactiveBoost;
                    dummy.scale.set(s, s, s);
                    if (p.rotation) {
                        p.rotation.x += p.rotationSpeed.x;
                        p.rotation.y += p.rotationSpeed.y;
                        if (p.isRibbon && currentState === STATES.SCATTERED) {
                            p.rotation.z += p.rotationSpeed.z;
                        } else if (!p.isRibbon) {
                            p.rotation.z += p.rotationSpeed.z;
                        }
                        dummy.rotation.copy(p.rotation);
                    } else {
                        dummy.rotation.set(0, 0, 0);
                    }
                    dummy.updateMatrix();
                    p.mesh.setMatrixAt(p.index, dummy.matrix);
                }
            });
            sphereMesh.instanceMatrix.needsUpdate = true;
            cubeMesh.instanceMatrix.needsUpdate = true;
            candyMesh.instanceMatrix.needsUpdate = true;
            ribbonMesh.instanceMatrix.needsUpdate = true;
            // 【恢复】更新大型元素的矩阵
            largeSphereMesh.instanceMatrix.needsUpdate = true;
            largeCubeMesh.instanceMatrix.needsUpdate = true;
            largeCandyMesh.instanceMatrix.needsUpdate = true;

            // 2. Sparkles
            const positions = sparklesSystem.geometry.attributes.position.array;
            const starPos = starMesh.position;
            for (let i = 0; i < CONFIG.SPARKLE_COUNT; i++) {
                sparkleData[i].life -= delta * 20;
                if (sparkleData[i].life < 0 || positions[i * 3 + 1] < -CONFIG.TREE_HEIGHT) {
                    sparkleData[i].life = 100;
                    positions[i * 3] = starPos.x + (Math.random() - 0.5) * 2;
                    positions[i * 3 + 1] = starPos.y + (Math.random() - 0.5) * 2;
                    positions[i * 3 + 2] = starPos.z + (Math.random() - 0.5) * 2;
                    sparkleData[i].velocity.set((Math.random() - 0.5) * 0.3, -Math.random() * 0.8 - 0.2, (Math.random() - 0.5) * 0.3);
                } else {
                    positions[i * 3] += sparkleData[i].velocity.x * delta * 10;
                    positions[i * 3 + 1] += sparkleData[i].velocity.y * delta * 10;
                    positions[i * 3 + 2] += sparkleData[i].velocity.z * delta * 10;
                }
            }
            sparklesSystem.geometry.attributes.position.needsUpdate = true;
            updateAudioReactiveGlow();

            if (auraMesh) {
                auraMesh.material.opacity = 0.46 + Math.sin(time * 0.6) * 0.05 + audioReactiveLevel * 0.08;
                const auraScale = 52 + Math.sin(time * 0.4) * 2 + audioReactiveLevel * 3;
                auraMesh.scale.set(auraScale, auraScale, 1);
            }

            if (ambientDustSystem) {
                ambientDustSystem.rotation.y += delta * 0.018;
                ambientDustSystem.rotation.x = Math.sin(time * 0.15) * 0.06;
                ambientDustSystem.material.opacity = 0.18 + audioReactiveLevel * 0.05;
            }

            if (foregroundDustSystem) {
                const foregroundPositions = foregroundDustSystem.geometry.attributes.position.array;
                for (let i = 0; i < foregroundPositions.length; i += 3) {
                    foregroundPositions[i + 1] += Math.sin(time * 0.8 + i) * 0.002;
                    foregroundPositions[i + 2] -= delta * 1.8;
                    if (foregroundPositions[i + 2] < 8) {
                        foregroundPositions[i] = (Math.random() - 0.5) * 18;
                        foregroundPositions[i + 1] = (Math.random() - 0.5) * 12;
                        foregroundPositions[i + 2] = 22 + Math.random() * 14;
                    }
                }
                foregroundDustSystem.geometry.attributes.position.needsUpdate = true;
                foregroundDustSystem.material.opacity = 0.12 + audioReactiveLevel * 0.04;
            }

            // 3. 照片更新 (【恢复】动态FOV距离计算)
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            // 目标高度=照片高度(3.5)*放大倍数(3.5) + 边距 ~= 14
            const targetHeight = 14;
            const distance = targetHeight / (2 * Math.tan(vFOV / 2));
            const targetWorldPos = new THREE.Vector3(0, 0, -distance).applyQuaternion(camera.quaternion).add(camera.position);
            const targetLocalPos = scene.worldToLocal(targetWorldPos.clone());

            photosData.forEach((p, idx) => {
                if (currentState === STATES.ENLARGED && idx === selectedPhotoIndex) {
                    // 覆盖目标位置为屏幕正中心
                    p.target.copy(targetLocalPos);
                }

                p.current.lerp(p.target, lerpSpeed);

                if (currentState === STATES.ENLARGED && idx === selectedPhotoIndex) {
                    // 强制面向相机
                    p.mesh.lookAt(camera.position);
                    p.mesh.scale.lerp(new THREE.Vector3(3.5, 3.5, 3.5), lerpSpeed);
                } else {
                    p.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), lerpSpeed);
                    if (currentState === STATES.SCATTERED) p.mesh.lookAt(camera.position);
                    else p.mesh.rotation.copy(p.initialRot);
                }
                p.mesh.position.copy(p.current);
            });

            controls.update();
            composer.render();
        }

        function switchState(newState) {
            if (currentState === newState && newState !== STATES.ENLARGED) return;
            currentState = newState;

            let text = "";
            if (newState === STATES.COLLAPSED) {
                text = "🎄 BARBIE TREE";
                controls.autoRotate = true;
                updateParticleEmissiveIntensity(1.0);
                particlesData.forEach(p => p.target.copy(p.collapsed));
                photosData.forEach(p => p.target.copy(p.collapsed));
            } else if (newState === STATES.SCATTERED) {
                text = "✨ GALAXY (WAVE HAND)";
                controls.autoRotate = false;
                updateParticleEmissiveIntensity(2.0);
                particlesData.forEach(p => p.target.copy(p.scattered));
                photosData.forEach(p => p.target.copy(p.scattered));
            } else if (newState === STATES.ENLARGED) {
                text = "💖 PRECIOUS MEMORY";
                updateParticleEmissiveIntensity(1.0);
                // 放大时，其他照片回散开位
                photosData.forEach((p, i) => {
                    if (i !== selectedPhotoIndex) p.target.copy(p.scattered);
                });
            }
            stateLabel.innerText = text;
        }

        // ==========================================
        // 9. MediaPipe AI 交互 (XY轴旋转 + 鲁棒捏合)
        // ==========================================
        async function initMediaPipe() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('Camera access is not supported in this browser.');
            }

            const vision = await FilesetResolver.forVisionTasks(
                "https://unpkg.com/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO"
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoEl.srcObject = stream;
            videoEl.addEventListener("loadeddata", predictLoop, { once: true });
        }

        function predictLoop() {
            if (!gestureRecognizer) return;
            const now = performance.now();
            if (videoEl.currentTime !== lastVideoTime) {
                lastVideoTime = videoEl.currentTime;
                const results = gestureRecognizer.recognizeForVideo(videoEl, now);

                if (results.gestures.length > 0) {
                    const name = results.gestures[0][0].categoryName;
                    const landmarks = results.landmarks[0];
                    handleGesture(name, landmarks);
                } else {
                    highlightHint(null);
                }

                if (results.landmarks.length > 0 && currentState === STATES.SCATTERED) {
                    const hand = results.landmarks[0][9];
                    const dx = hand.x - lastHandX;
                    const dy = hand.y - lastHandY;

                    if (Math.abs(dx) > 0.005) {
                        targetSceneRotationY -= dx * CONFIG.ROTATION_SENSITIVITY;
                        highlightHint('palm');
                    }
                    if (Math.abs(dy) > 0.005) {
                        targetSceneRotationX -= dy * CONFIG.ROTATION_SENSITIVITY * 0.5;
                        targetSceneRotationX = Math.max(-0.5, Math.min(0.5, targetSceneRotationX));
                    }

                    lastHandX = hand.x;
                    lastHandY = hand.y;
                }
            }
            requestAnimationFrame(predictLoop);
        }

        function handleGesture(name, landmarks) {
            if (name === "Closed_Fist") {
                switchState(STATES.COLLAPSED);
                highlightHint('fist');
            } else if (name === "Open_Palm") {
                switchState(STATES.SCATTERED);
            }

            if (currentState === STATES.SCATTERED) {
                const thumb = landmarks[4];
                const index = landmarks[8];
                const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                if (dist < CONFIG.PINCH_THRESHOLD) {
                    highlightHint('pinch');
                    triggerPhotoFocus();
                }
            }
        }

        function highlightHint(id) {
            Object.values(hints).forEach(el => {
                el.classList.remove('highlight');
                el.classList.remove('pinch-ready');
            });
            if (id && hints[id]) {
                hints[id].classList.add('highlight');
                if (id === 'pinch') hints[id].classList.add('pinch-ready');
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
